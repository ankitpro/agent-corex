---
layout: default
---

<!-- Breadcrumb Navigation -->
{% if page.url != '/' %}
<nav class="breadcrumb" aria-label="Breadcrumb">
    <ol class="breadcrumb-list">
        <li class="breadcrumb-item">
            <a href="{{ '/' | relative_url }}">Home</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">
            {{ page.title | strip_html }}
        </li>
    </ol>
</nav>
{% endif %}

<div class="page-container">
    <aside class="sidebar">
        {% include sidebar.html %}
    </aside>

    <article class="page-content">
        <div class="container">
            {% if page.title %}
            <h1>{{ page.title }}</h1>
            {% endif %}

            {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
            {% endif %}

            {{ content }}
        </div>
    </article>
</div>

<style>
/* Breadcrumb Navigation */
.breadcrumb {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 10px 20px;
    background: transparent;
}

.breadcrumb-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    padding: 0;
    margin: 0;
    gap: 0;
}

.breadcrumb-item {
    display: flex;
    align-items: center;
    margin: 0;
}

.breadcrumb-item:not(:last-child)::after {
    content: "/";
    margin: 0 8px;
    color: #999;
}

.breadcrumb-item a {
    color: #27AE60 !important;
    text-decoration: none !important;
    border: none !important;
    font-size: 14px;
    transition: color 0.2s ease;
}

.breadcrumb-item a:hover {
    color: #E67E22 !important;
}

.breadcrumb-item.active {
    color: #666;
    font-size: 14px;
    font-weight: 500;
}

/* Page Container */
.page-container {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 40px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
}

.sidebar {
    position: sticky;
    top: 100px;
    height: fit-content;
}

.page-content {
    min-height: 100vh;
}

.page-description {
    color: #666;
    font-size: 18px;
    font-style: italic;
    margin-bottom: 30px;
}

@media (max-width: 768px) {
    .breadcrumb {
        padding: 10px;
    }

    .page-container {
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .sidebar {
        position: static;
    }
}
</style>
