---
layout: default
---

<div class="page-container">
    <aside class="sidebar">
        {% include sidebar.html %}
    </aside>

    <article class="page-content">
        <div class="container">
            {% if page.title %}
            <h1>{{ page.title }}</h1>
            {% endif %}

            {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
            {% endif %}

            {{ content }}
        </div>
    </article>
</div>

<style>
.page-container {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 40px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
}

.sidebar {
    position: sticky;
    top: 100px;
    height: fit-content;
}

.page-content {
    min-height: 100vh;
}

.page-description {
    color: #666;
    font-size: 18px;
    font-style: italic;
    margin-bottom: 30px;
}

@media (max-width: 768px) {
    .page-container {
        grid-template-columns: 1fr;
        gap: 20px;
    }

    .sidebar {
        position: static;
    }
}
</style>
