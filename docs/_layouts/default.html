<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#27AE60">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="author" content="{{ site.author }}">
    <meta name="keywords" content="LLM, tool selection, semantic search, MCP, agent">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://ankitpro.github.io/agent-corex{% if page.url != '/' %}{{ page.url }}{% endif %}">

    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="https://ankitpro.github.io/agent-corex{% if page.url != '/' %}{{ page.url }}{% endif %}">
    <meta property="og:image" content="https://ankitpro.github.io/agent-corex/assets/images/og-image.png">
    <meta property="og:type" content="{% if page.layout == 'page' %}article{% else %}website{% endif %}">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="{{ site.title }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="twitter:image" content="https://ankitpro.github.io/agent-corex/assets/images/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://ankitpro.github.io/agent-corex/assets/images/favicon.png">
    <link rel="apple-touch-icon" href="https://ankitpro.github.io/agent-corex/assets/images/apple-touch-icon.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ '/agent-corex/assets/css/style.scss' | relative_url }}">

    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "{{ site.title }}",
        "description": "{{ site.description }}",
        "url": "https://ankitpro.github.io/agent-corex/",
        "image": "https://ankitpro.github.io/agent-corex/assets/images/og-image.png",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "author": {
            "@type": "Person",
            "name": "{{ site.author }}",
            "url": "{{ site.website }}",
            "sameAs": [
                "https://github.com/{{ site.author_github }}",
                "https://www.linkedin.com/in/{{ site.author_linkedin }}"
            ]
        },
        "provider": {
            "@type": "Organization",
            "name": "{{ site.author }}",
            "url": "{{ site.website }}"
        },
        "softwareVersion": "1.0.2",
        "datePublished": "2024-01-01",
        "inLanguage": "en-US",
        "isAccessibleForFree": true,
        "downloadUrl": "https://pypi.org/project/agent-corex/",
        "codeRepository": "https://github.com/ankitpro/agent-corex"
    }
    </script>

    {% seo %}
</head>
<body>
    {% include header.html %}
    {% include nav.html %}

    <main>
        <!-- JSON-LD Breadcrumb Navigation -->
        {% if page.url != '/' %}
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "BreadcrumbList",
            "itemListElement": [
                {
                    "@type": "ListItem",
                    "position": 1,
                    "name": "Home",
                    "item": "https://ankitpro.github.io/agent-corex/"
                },
                {
                    "@type": "ListItem",
                    "position": 2,
                    "name": "{{ page.title | strip_html }}",
                    "item": "https://ankitpro.github.io/agent-corex{{ page.url }}"
                }
            ]
        }
        </script>
        {% endif %}

        {{ content }}
    </main>

    {% include footer.html %}
</body>
</html>
