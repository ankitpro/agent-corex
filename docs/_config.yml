# GitHub Pages Configuration
# Site: https://ankitpro.github.io/agent-corex/
# Last rebuilt: 2026-03-22

# ============================================
# Site Settings
# ============================================
title: "Agent-Corex"
tagline: "Intelligent Tool Selection for LLMs"
description: "Fast, accurate MCP tool retrieval engine with hybrid semantic + keyword ranking"
url: "https://ankitpro.github.io"
baseurl: "/agent-corex"
lang: "en"

# ============================================
# Theme & Styling
# ============================================
theme: jekyll-theme-slate
remote_theme: pages-themes/slate@v0.2.0

# Custom styling
sass:
  sass_dir: _sass
  style: compressed

# ============================================
# Plugins
# ============================================
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# ============================================
# Markdown Settings
# ============================================
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# ============================================
# Navigation Structure
# ============================================
# Main navigation menu
nav_main:
  - title: "🏠 Home"
    url: "/"
    description: "Overview and introduction"

  - title: "🎛️ Dashboard"
    url: "/dashboard"
    description: "Interactive tool testing dashboard"

  - title: "⚡ Quick Start"
    url: "/quickstart"
    description: "Get started in 5 minutes"

  - title: "📦 Installation"
    url: "/installation"
    description: "Setup and configuration"

  - title: "🔌 API Reference"
    url: "/api"
    description: "Complete API documentation"

  - title: "🚀 Deployment"
    url: "/deployment"
    description: "Production deployment guides"

# External links
nav_external:
  - title: "⭐ GitHub"
    url: "https://github.com/ankitpro/agent-corex"
    icon: "github"

  - title: "📦 PyPI"
    url: "https://pypi.org/project/agent-corex/"
    icon: "package"

  - title: "🐛 Issues"
    url: "https://github.com/ankitpro/agent-corex/issues"
    icon: "issues"

# ============================================
# Repository Information
# ============================================
repository: ankitpro/agent-corex
github_user: ankitpro
github_repo: agent-corex
github_owner: ankitpro

# ============================================
# Author & Contact
# ============================================
author: "Ankit Agarwal"
author_github: ankitpro
author_linkedin: ankitagarwal94
email: "ankitagarwalpro@gmail.com"
website: "https://ankitpro.github.io/portfolio"

# ============================================
# Social Media
# ============================================
social:
  github_username: ankitpro
  linkedin_username: ankitagarwal94

# ============================================
# Analytics
# ============================================
google_analytics_id: ""

# ============================================
# SEO & OpenGraph
# ============================================
og_image: "https://ankitpro.github.io/agent-corex/assets/images/og-image.png"
og_type: "website"
og_locale: "en_US"

# Canonical URL (prevents duplicate content)
canonical: "https://ankitpro.github.io/agent-corex"

# Twitter Card
twitter:
  username: ankitpro

# JSON-LD Schema
schema:
  type: "SoftwareApplication"
  applicationCategory: "DeveloperApplication"
  operatingSystem: "Any"

# Sitemap configuration
sitemap:
  priority: 0.5

# Search engines
noindex: false
nofollow: false

# ============================================
# Build Settings
# ============================================
exclude:
  - .github/
  - .gitignore
  - .vscode/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .env
  - .venv
  - README.md
  - CHANGELOG.md

keep_files:
  - assets
  - _includes
  - _layouts

# ============================================
# Collections
# ============================================
collections:
  docs:
    output: true
    permalink: /:collection/:name

# ============================================
# Defaults
# ============================================
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      toc: true

  - scope:
      path: "docs"
    values:
      layout: "page"
      toc: true
