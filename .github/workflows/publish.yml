name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.0.1, etc.

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools twine

    - name: Set version from tag
      run: |
        # Strip leading 'v' from tag (v1.1.0 → 1.1.0)
        VERSION="${GITHUB_REF_NAME#v}"
        echo "Building version: $VERSION"
        # Patch pyproject.toml so the built wheel carries the right version
        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
        grep '^version' pyproject.toml

    - name: Build distribution packages
      run: python -m build

    - name: Validate distribution
      run: twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4.6.2
      with:
        name: dist
        path: dist/
        retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4.3.0
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Success notification
      run: |
        echo "✅ Successfully published to PyPI!"
        echo "Version: ${{ steps.version.outputs.VERSION }}"
        echo "PyPI Package: https://pypi.org/project/agent-corex/${{ steps.version.outputs.VERSION }}/"
