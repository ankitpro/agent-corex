name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "RELEASE_NAME=Agent-Core $VERSION" >> $GITHUB_OUTPUT

    - name: Get changelog
      id: changelog
      run: |
        # Extract changelog for this version from RELEASE_NOTES.md
        python3 << 'EOF'
        import re
        
        version = "${{ steps.version.outputs.VERSION }}"
        
        try:
            with open("RELEASE_NOTES.md", "r") as f:
                content = f.read()
            
            # Find the section for this version
            pattern = rf"## {re.escape(version)}.*?(?=## |$)"
            match = re.search(pattern, content, re.DOTALL)
            
            if match:
                changelog = match.group(0).strip()
                # Write to output file
                with open("changelog.txt", "w") as f:
                    f.write(changelog)
                print("Changelog extracted successfully")
            else:
                print(f"Version {version} not found in RELEASE_NOTES.md")
                # Create default changelog
                with open("changelog.txt", "w") as f:
                    f.write(f"## {version}\n\nSee RELEASE_NOTES.md for details.")
        except Exception as e:
            print(f"Error: {e}")
            with open("changelog.txt", "w") as f:
                f.write(f"## {version}\n\nRelease notes pending.")
        EOF

    - name: Read changelog
      id: read_changelog
      run: |
        CHANGELOG=$(cat changelog.txt)
        # Escape newlines for GitHub Actions
        CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
        echo "BODY=$CHANGELOG" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: ${{ steps.version.outputs.RELEASE_NAME }}
        body: ${{ steps.read_changelog.outputs.BODY }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
        generate_release_notes: true

    - name: Success notification
      run: |
        echo "✅ Release created successfully!"
        echo "Version: ${{ steps.version.outputs.VERSION }}"
        echo "GitHub Release: https://github.com/ankitpro/agent-corex/releases/tag/${{ steps.version.outputs.VERSION }}"
