name: Test, Release & Publish

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov

    - name: Run tests
      run: pytest tests/ -v --cov=agent_core --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    name: Build Distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools twine

    - name: Build distribution
      run: python -m build

    - name: Validate distribution
      run: twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/
        retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "RELEASE_NAME=Agent-Core $VERSION" >> $GITHUB_OUTPUT

    - name: Get changelog
      id: changelog
      run: |
        python3 << 'EOF'
        import re
        
        version = "${{ steps.version.outputs.VERSION }}"
        
        try:
            with open("RELEASE_NOTES.md", "r") as f:
                content = f.read()
            
            # Find the section for this version
            pattern = rf"## {re.escape(version)}.*?(?=## |$)"
            match = re.search(pattern, content, re.DOTALL)
            
            if match:
                changelog = match.group(0).strip()
            else:
                changelog = f"Release {version}\n\nSee RELEASE_NOTES.md for full details."
        except Exception as e:
            changelog = f"Release {version}"
        
        # Write to file for next step
        with open("/tmp/changelog.txt", "w") as f:
            f.write(changelog)
        EOF
        cat /tmp/changelog.txt >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: ${{ steps.version.outputs.RELEASE_NAME }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.VERSION, 'rc') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
        generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build, create-release]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist
        path: dist/

    - name: Verify artifacts exist
      run: |
        if [ ! -f dist/agent_corex-*.whl ] || [ ! -f dist/agent_corex-*.tar.gz ]; then
          echo "❌ Distribution artifacts not found!"
          ls -la dist/
          exit 1
        fi
        echo "✅ Distribution artifacts verified:"
        ls -lh dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
      continue-on-error: true

    - name: Verify PyPI publication
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "📦 Package: agent-corex"
        echo "📌 Version: $VERSION"
        echo "🔗 PyPI: https://pypi.org/project/agent-corex/$VERSION/"
        echo ""
        echo "⏳ It may take a few minutes for the package to appear on PyPI."
        echo ""
        echo "If you see an error about PYPI_API_TOKEN:"
        echo "1. Go to: https://github.com/ankitpro/agent-corex/settings/secrets/actions"
        echo "2. Click 'New repository secret'"
        echo "3. Name: PYPI_API_TOKEN"
        echo "4. Value: Your token from https://pypi.org/manage/account/token/"

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Verify PyPI publication
      run: |
        echo "✅ Successfully published to PyPI!"
        echo "Version: ${{ steps.version.outputs.VERSION }}"
        echo "Package URL: https://pypi.org/project/agent-corex/${{ steps.version.outputs.VERSION }}/"

  notify:
    name: Send Notifications
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Check job status
      run: |
        if [ "${{ needs.publish-pypi.result }}" == "success" ]; then
          echo "✅ All workflows completed successfully!"
          echo "🎉 Agent-Core ${{ steps.version.outputs.VERSION }} is now available on PyPI"
          echo "📦 https://pypi.org/project/agent-corex/${{ steps.version.outputs.VERSION }}/"
          echo "🐙 https://github.com/ankitpro/agent-corex/releases/tag/${{ steps.version.outputs.VERSION }}"
        else
          echo "⚠️ Some workflows failed. Check logs for details."
        fi
