name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml,server]"

      - name: Lint with flake8
        run: |
          flake8 agent_core tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 agent_core tests --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

      - name: Format check with black
        run: |
          black --check agent_core tests --line-length=100

      - name: Type check with mypy
        run: |
          mypy agent_core --ignore-missing-imports || true

      - name: Run tests
        run: |
          pytest tests/ -v --cov=agent_core --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Verify distribution
        run: |
          pip install twine
          twine check dist/*
