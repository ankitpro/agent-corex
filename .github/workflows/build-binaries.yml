name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: agent-corex-linux-x86_64
            ext: ""
          - os: macos-15          # arm64 — runs on Intel via Rosetta 2 as well
            artifact: agent-corex-macos-arm64
            ext: ""
          - os: windows-2022
            artifact: agent-corex-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install typer[all] pydantic "python-dotenv>=1.0.0" requests httpx rich pyinstaller
          # Install package without pulling heavy ML transitive deps
          pip install --no-deps --no-build-isolation .

      - name: Build binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --name agent-corex \
            --collect-all agent_core \
            --hidden-import typer \
            --hidden-import rich \
            --hidden-import httpx \
            --hidden-import requests \
            --hidden-import dotenv \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --exclude-module sentence_transformers \
            --exclude-module transformers \
            --exclude-module faiss \
            --exclude-module sklearn \
            --exclude-module scipy \
            --exclude-module matplotlib \
            --exclude-module fastapi \
            --exclude-module uvicorn \
            agent_core/cli/main.py
          chmod +x dist/agent-corex
          mv dist/agent-corex dist/${{ matrix.artifact }}

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name agent-corex `
            --collect-all agent_core `
            --hidden-import typer `
            --hidden-import rich `
            --hidden-import httpx `
            --hidden-import requests `
            --hidden-import dotenv `
            --exclude-module torch `
            --exclude-module torchvision `
            --exclude-module torchaudio `
            --exclude-module sentence_transformers `
            --exclude-module transformers `
            --exclude-module faiss `
            --exclude-module sklearn `
            --exclude-module scipy `
            --exclude-module matplotlib `
            --exclude-module fastapi `
            --exclude-module uvicorn `
            agent_core\cli\main.py
          Move-Item dist\agent-corex.exe dist\${{ matrix.artifact }}.exe

      - name: Compute SHA256 (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256 2>/dev/null \
            || shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          cat ${{ matrix.artifact }}.sha256

      - name: Compute SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/${{ matrix.artifact }}.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.exe" | Out-File -Encoding ascii dist/${{ matrix.artifact }}.sha256
          Get-Content dist/${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}${{ matrix.ext }}
            dist/${{ matrix.artifact }}.sha256
          retention-days: 30

  release:
    name: Attach binaries to GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts/

      - name: Flatten artifacts into release/
        run: |
          mkdir -p release
          # download-artifact@v4 nests files as artifacts/<name>/<original-path>/file
          # flatten everything into release/
          find artifacts/ -type f | while read f; do
            cp "$f" release/
          done
          echo "=== Release files ==="
          ls -lh release/

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "refs/heads/main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Delete existing release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          RELEASE_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting stale release $RELEASE_ID for $TAG"
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID"
          fi

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: false

      - name: Output release asset URLs
        run: |
          echo "Release: https://github.com/ankitpro/agent-corex/releases/tag/${{ steps.version.outputs.TAG }}"
