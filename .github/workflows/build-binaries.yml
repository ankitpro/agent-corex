name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.2.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: agent-corex-linux-x86_64
            ext: ""
          - os: macos-15          # arm64 — runs on Intel via Rosetta 2 as well
            artifact: agent-corex-macos-arm64
            ext: ""
          - os: windows-2022
            artifact: agent-corex-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-binary.txt
          # Install the package itself without heavy ML extras
          pip install --no-deps -e .

      - name: Build binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --name agent-corex \
            --hidden-import agent_core \
            --hidden-import agent_core.cli \
            --hidden-import agent_core.cli.main \
            --hidden-import agent_core.detectors \
            --hidden-import agent_core.config_adapters \
            --hidden-import agent_core.local_config \
            --hidden-import typer \
            --hidden-import rich \
            --hidden-import httpx \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --exclude-module sentence_transformers \
            --exclude-module transformers \
            --exclude-module faiss \
            --exclude-module sklearn \
            --exclude-module scipy \
            --exclude-module matplotlib \
            --exclude-module fastapi \
            --exclude-module uvicorn \
            agent_core/cli/main.py
          chmod +x dist/agent-corex
          mv dist/agent-corex dist/${{ matrix.artifact }}

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name agent-corex `
            --hidden-import agent_core `
            --hidden-import agent_core.cli `
            --hidden-import agent_core.cli.main `
            --hidden-import agent_core.detectors `
            --hidden-import agent_core.config_adapters `
            --hidden-import agent_core.local_config `
            --hidden-import typer `
            --hidden-import rich `
            --hidden-import httpx `
            --exclude-module torch `
            --exclude-module torchvision `
            --exclude-module torchaudio `
            --exclude-module sentence_transformers `
            --exclude-module transformers `
            --exclude-module faiss `
            --exclude-module sklearn `
            --exclude-module scipy `
            --exclude-module matplotlib `
            --exclude-module fastapi `
            --exclude-module uvicorn `
            agent_core/cli/main.py
          Move-Item dist/agent-corex.exe dist/${{ matrix.artifact }}.exe

      - name: Compute SHA256 (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256 2>/dev/null \
            || shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          cat ${{ matrix.artifact }}.sha256

      - name: Compute SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/${{ matrix.artifact }}.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}.exe" | Out-File -Encoding ascii dist/${{ matrix.artifact }}.sha256
          Get-Content dist/${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}${{ matrix.ext }}
            dist/${{ matrix.artifact }}.sha256
          retention-days: 30

  release:
    name: Attach binaries to GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist/

      - name: List built binaries
        run: find dist/ -type f | sort

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "refs/heads/main" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: |
            dist/agent-corex-linux-x86_64/agent-corex-linux-x86_64
            dist/agent-corex-linux-x86_64/agent-corex-linux-x86_64.sha256
            dist/agent-corex-macos-arm64/agent-corex-macos-arm64
            dist/agent-corex-macos-arm64/agent-corex-macos-arm64.sha256
            dist/agent-corex-windows-x86_64/agent-corex-windows-x86_64.exe
            dist/agent-corex-windows-x86_64/agent-corex-windows-x86_64.sha256
          fail_on_unmatched_files: false

      - name: Output release asset URLs
        run: |
          echo "Release: https://github.com/ankitpro/agent-corex/releases/tag/${{ steps.version.outputs.TAG }}"
