name: Update Homebrew Tap

# Runs after build-binaries completes on a tag push.
# Downloads the .sha256 sidecar files from the release and patches
# homebrew/Formula/agent-corex.rb with the new version + hashes,
# then opens a PR (or direct-pushes) to the tap repository.
#
# Required secrets:
#   TAP_GITHUB_TOKEN — Personal Access Token with repo write access to the tap repo.
#                      Create at: https://github.com/settings/tokens
#                      Scopes required: repo (full)
#
# Tap repository convention:
#   github.com/ankitpro/homebrew-agent-corex
#   Formula/agent-corex.rb

on:
  workflow_run:
    workflows: ["Build Binaries"]
    types: [completed]
    branches-ignore: []
  # Allow manual trigger for a specific tag
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to use (e.g. v1.2.0)'
        required: true

jobs:
  update-tap:
    name: Patch formula and push to tap
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'refs/tags/v'))

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          # Strip refs/tags/ prefix if present
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG"       >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download SHA256 files from release
        id: hashes
        run: |
          BASE="https://github.com/ankitpro/agent-corex/releases/download/${{ steps.tag.outputs.TAG }}"

          fetch_sha256() {
            local url="$1"
            curl -fsSL "$url" | awk '{print $1}'
          }

          ARM64_SHA=$(fetch_sha256  "$BASE/agent-corex-macos-arm64.sha256")
          X86_SHA=$(fetch_sha256    "$BASE/agent-corex-macos-x86_64.sha256")
          LINUX_SHA=$(fetch_sha256  "$BASE/agent-corex-linux-x86_64.sha256")

          echo "ARM64_SHA=$ARM64_SHA"   >> $GITHUB_OUTPUT
          echo "X86_SHA=$X86_SHA"       >> $GITHUB_OUTPUT
          echo "LINUX_SHA=$LINUX_SHA"   >> $GITHUB_OUTPUT

          echo "arm64:  $ARM64_SHA"
          echo "x86_64: $X86_SHA"
          echo "linux:  $LINUX_SHA"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ankitpro/homebrew-agent-corex
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Patch formula
        run: |
          FORMULA="tap/Formula/agent-corex.rb"
          VERSION="${{ steps.tag.outputs.VERSION }}"
          ARM64="${{ steps.hashes.outputs.ARM64_SHA }}"
          X86="${{ steps.hashes.outputs.X86_SHA }}"
          LINUX="${{ steps.hashes.outputs.LINUX_SHA }}"

          # Update version
          sed -i "s|version \".*\"|version \"$VERSION\"|" "$FORMULA"

          # Update SHA256 placeholders / previous values
          # Each sha256 line appears right after its url line — use line-specific substitution
          python3 - "$FORMULA" "$ARM64" "$X86" "$LINUX" <<'PYEOF'
          import sys, re

          path, arm64, x86, linux = sys.argv[1:]

          text = open(path).read()

          # Replace sha256 after arm64 url block
          text = re.sub(
              r'(agent-corex-macos-arm64"\n\s+sha256 ")[^"]*(")',
              rf'\g<1>{arm64}\g<2>', text)

          # Replace sha256 after x86_64 url block
          text = re.sub(
              r'(agent-corex-macos-x86_64"\n\s+sha256 ")[^"]*(")',
              rf'\g<1>{x86}\g<2>', text)

          # Replace sha256 after linux url block
          text = re.sub(
              r'(agent-corex-linux-x86_64"\n\s+sha256 ")[^"]*(")',
              rf'\g<1>{linux}\g<2>', text)

          open(path, 'w').write(text)
          print("Formula patched successfully.")
          PYEOF

          echo "--- Updated formula ---"
          cat "$FORMULA"

      - name: Commit and push to tap
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-corex.rb
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "agent-corex ${{ steps.tag.outputs.VERSION }}"
          git push
